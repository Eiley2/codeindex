name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cocoindex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cocoindex_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      COCOINDEX_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cocoindex_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy codeindex tests

      - name: Tests
        run: uv run pytest -q
